name: iOS Build

on:
  push:
    branches: [ main, master ]
  pull_request:branches: [ main, master ]

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build Projucer
        run: |
          git clone https://github.com/juce-framework/JUCE.git --depth 1
          cd JUCE/extras/Projucer/Builds/MacOSX
          xcodebuild -configuration Release -quiet
          sudo cp build/Release/Projucer.app/Contents/MacOS/Projucer /usr/local/bin/

      - name: Clean Slate Configuration (Python)
        shell: python
        run: |
          import xml.etree.ElementTree as ET
          import os

          jucer_path = 'NewProject/NewProject.jucer'
          juce_modules = os.path.abspath("JUCE/modules")
          
          tree = ET.parse(jucer_path)
          root = tree.getroot()

          # 1. Matikan pengaturan global
          for mod in root.findall(".//MODULE"):
              mod.set('useLocalCopy', '0')
              mod.set('useGlobalPath', '0')

          # 2. Hapus semua exporter lama (Android, dll)
          export_formats = root.find('EXPORTFORMATS')
          if export_formats is not None:
              for child in list(export_formats):
                  export_formats.remove(child)

          # 3. Tambahkan satu exporter iOS yang bersih
          xcode_iphone = ET.SubElement(export_formats, 'XCODE_IPHONE', {
              'targetFolder': 'Builds/iOS',
              'appleCombinedIPHONEOS_IPHONESIMULATOR': '1',
              'iosScreenOrientation': 'UIInterfaceOrientationPortrait',
              'bundleIdentifier': 'com.skystream.rx'
          })
          
          configs = ET.SubElement(xcode_iphone, 'CONFIGURATIONS')
          ET.SubElement(configs, 'CONFIGURATION', {'isDebug': '1', 'name': 'Debug', 'targetName': 'SkyStream'})
          ET.SubElement(configs, 'CONFIGURATION', {'isDebug': '0', 'name': 'Release', 'targetName': 'SkyStream'})
          
          module_paths = ET.SubElement(xcode_iphone, 'MODULEPATHS')
          for mod in root.findall(".//MODULES/MODULE"):
              mod_id = mod.get('id')
              ET.SubElement(module_paths, 'MODULEPATH', {'id': mod_id, 'path': juce_modules})
          
          tree.write(jucer_path, encoding='utf-8', xml_declaration=True)

      - name: Resave Jucer File
        run: |
          Projucer --resave NewProject/NewProject.jucer --fix-missing-dependencies

      - name: Build iOS App
        run: |
          # Perbaikan kunci: Menambahkan flag untuk mematikan signing secara total
          xcodebuild -project NewProject/Builds/iOS/SkyStreamRXV2.xcodeproj \
                     -scheme "SkyStreamRXV2 - App" \
                     -configuration Release \
                     -sdk iphoneos \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     CODE_SIGN_ENTITLEMENTS="" \
                     GCC_GENERATE_DEBUGGING_SYMBOLS=NO \
                     build

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SkyStream-iOS
          path: NewProject/Builds/iOS/build/Release-iphoneos/SkyStream.app