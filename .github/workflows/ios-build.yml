name: iOS Build

on:
  push:
    branches: [ main, master ]

jobs:
  build-ios:
    runs-on: macos-latest

    steps:

      - uses: actions/checkout@v4

      - name: Clone JUCE
        run: |
          git clone https://github.com/juce-framework/JUCE.git --depth 1


      - name: Build Projucer
        run: |
          cd JUCE/extras/Projucer/Builds/MacOSX
          xcodebuild -configuration Release -quiet
          sudo cp build/Release/Projucer.app/Contents/MacOS/Projucer /usr/local/bin/


      - name: Set JUCE Global Module Path
        run: |
          Projucer --set-global-search-path juce-modules "$PWD/JUCE/modules"


      - name: Resave Project
        run: |
          Projucer --resave NewProject/NewProject.jucer


      - name: Build iOS
        run: |
          xcodebuild \
            -project NewProject/Builds/iOS/NewProject.xcodeproj \
            -scheme "NewProject - App" \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            clean build