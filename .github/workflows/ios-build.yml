name: iOS Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build Projucer
        run: |
          git clone https://github.com/juce-framework/JUCE.git --depth 1
          cd JUCE/extras/Projucer/Builds/MacOSX
          xcodebuild -configuration Release -quiet
          sudo cp build/Release/Projucer.app/Contents/MacOS/Projucer /usr/local/bin/

      - name: Fix Jucer Paths and Add iOS Exporter (Python)
        shell: python
        run: |
          import xml.etree.ElementTree as ET
          import os

          jucer_path = 'NewProject/NewProject.jucer'
          # Ambil jalur absolut modul JUCE di server GitHub
          juce_modules_path = os.path.abspath('JUCE/modules')
          
          tree = ET.parse(jucer_path)
          root = tree.getroot()

          # 1. PERBAIKAN TOTAL: Ganti SEMUA path modul di semua exporter yang ada
          for mp in root.findall(".//MODULEPATH"):
              mp.set('path', juce_modules_path)
              print(f"Updated module {mp.get('id')} to {juce_modules_path}")

          # 2. TAMBAH EXPORTER iOS: Jika belum ada di file .jucer
          export_formats = root.find('EXPORTFORMATS')
          if export_formats is not None and root.find(".//XCODE_IPHONE") is None:
              print("Adding XCODE_IPHONE exporter...")
              xcode_iphone = ET.SubElement(export_formats, 'XCODE_IPHONE', {
                  'targetFolder': 'Builds/iOS',
                  'appleCombinedIPHONEOS_IPHONESIMULATOR': '1',
                  'iosScreenOrientation': 'UIInterfaceOrientationPortrait'
              })
              configs = ET.SubElement(xcode_iphone, 'CONFIGURATIONS')
              ET.SubElement(configs, 'CONFIGURATION', {'isDebug': '1', 'name': 'Debug', 'targetName': 'SkyStreamRXV2'})
              ET.SubElement(configs, 'CONFIGURATION', {'isDebug': '0', 'name': 'Release', 'targetName': 'SkyStreamRXV2'})
              
              module_paths = ET.SubElement(xcode_iphone, 'MODULEPATHS')
              for mod in root.findall(".//MODULES/MODULE"):
                  mod_id = mod.get('id')
                  ET.SubElement(module_paths, 'MODULEPATH', {'id': mod_id, 'path': juce_modules_path})
          
          # Simpan kembali file .jucer
          tree.write(jucer_path, encoding='utf-8', xml_declaration=True)
          print("Konfigurasi .jucer selesai.")

      - name: Resave Jucer File
        run: |
          Projucer --resave NewProject/NewProject.jucer

      - name: Build iOS App
        run: |
          # Menggunakan target 'SkyStreamRXV2' sesuai isi file .jucer Anda
          xcodebuild -project NewProject/Builds/iOS/SkyStreamRXV2.xcodeproj \
                     -scheme "SkyStreamRXV2 - App" \
                     -configuration Release \
                     -sdk iphoneos \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     clean build

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SkyStream-iOS
          path: NewProject/Builds/iOS/build/Release-iphoneos/*.app