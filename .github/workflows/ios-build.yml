name: iOS Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-ios:
    runs-on: macos-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive


      - name: Build Projucer
        run: |
          cd JUCE/extras/Projucer/Builds/MacOSX
          xcodebuild -configuration Release -quiet
          sudo cp build/Release/Projucer.app/Contents/MacOS/Projucer /usr/local/bin/


      - name: Resave Jucer File
        run: |
          Projucer --resave NewProject/NewProject.jucer


      - name: Build iOS App
        run: |
          xcodebuild \
            -project NewProject/Builds/iOS/NewProject.xcodeproj \
            -scheme "NewProject - App" \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            clean build


      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SkyStream-iOS
          path: |
            NewProject/Builds/iOS/build/Release-iphoneos/*.app