name: iOS Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build Projucer
        run: |
          git clone https://github.com/juce-framework/JUCE.git --depth 1
          cd JUCE/extras/Projucer/Builds/MacOSX
          xcodebuild -configuration Release -quiet
          sudo cp build/Release/Projucer.app/Contents/MacOS/Projucer /usr/local/bin/

      - name: Configure Jucer File
        run: |
          # 1. Pindahkan folder JUCE ke dalam NewProject agar path relatif bekerja
          mv JUCE NewProject/
          
          # 2. Tambahkan exporter XCODE_IPHONE ke file .jucer secara otomatis
          sed -i '' '/<EXPORTFORMATS>/a \
          <XCODE_IPHONE targetFolder="Builds/iOS" appleCombinedIPHONEOS_IPHONESIMULATOR="1" iosScreenOrientation="UIInterfaceOrientationPortrait" iosStatusBarStyle="Hidden"> \
            <CONFIGURATIONS> \
              <CONFIGURATION isDebug="1" name="Debug" targetName="SkyStreamRXV2"/> \
              <CONFIGURATION isDebug="0" name="Release" targetName="SkyStreamRXV2"/> \
            </CONFIGURATIONS> \
            <MODULEPATHS> \
              <MODULEPATH id="juce_audio_basics" path="../../JUCE/modules"/> \
              <MODULEPATH id="juce_audio_devices" path="../../JUCE/modules"/> \
              <MODULEPATH id="juce_audio_formats" path="../../JUCE/modules"/> \
              <MODULEPATH id="juce_audio_processors" path="../../JUCE/modules"/> \
              <MODULEPATH id="juce_audio_utils" path="../../JUCE/modules"/> \
              <MODULEPATH id="juce_core" path="../../JUCE/modules"/> \
              <MODULEPATH id="juce_data_structures" path="../../JUCE/modules"/> \
              <MODULEPATH id="juce_events" path="../../JUCE/modules"/> \
              <MODULEPATH id="juce_graphics" path="../../JUCE/modules"/> \
              <MODULEPATH id="juce_gui_basics" path="../../JUCE/modules"/> \
              <MODULEPATH id="juce_gui_extra" path="../../JUCE/modules"/> \
            </MODULEPATHS> \
          </XCODE_IPHONE>' NewProject/NewProject.jucer

      - name: Resave Jucer File
        run: |
          Projucer --resave NewProject/NewProject.jucer

      - name: Build iOS App
        run: |
          xcodebuild -project NewProject/Builds/iOS/SkyStreamRXV2.xcodeproj \
                     -scheme "SkyStreamRXV2 - App" \
                     -configuration Release \
                     -sdk iphoneos \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     clean build

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SkyStream-iOS
          path: NewProject/Builds/iOS/build/Release-iphoneos/*.app