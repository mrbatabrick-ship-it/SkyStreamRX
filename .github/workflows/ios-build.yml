name: iOS Build (Final Compatible)

on:
  push:    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache JUCE and Projucer
        id: cache-juce
        uses: actions/cache@v4
        with:
          path: |
            JUCE
            /usr/local/bin/Projucer
          key: ${{ runner.os }}-juce-v1

      - name: Build Projucer (if not cached)
        if: steps.cache-juce.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/juce-framework/JUCE.git --depth 1
          cd JUCE/extras/Projucer/Builds/MacOSX
          xcodebuild -configuration Release -quiet
          sudo cp build/Release/Projucer.app/Contents/MacOS/Projucer /usr/local/bin/

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Configure Jucer File (Python)
        shell: python
        run: |
          import xml.etree.ElementTree as ET
          import os
          jucer_path = 'NewProject/NewProject.jucer'
          juce_modules = os.path.abspath("JUCE/modules")
          icon_path = 'Source/icon.png'
          
          tree = ET.parse(jucer_path)
          root = tree.getroot()
          
          # 1. Pasang Icon
          root.set('iconBig', icon_path)
          
          # 2. Perbaiki SEMUA path modul
          for mp in root.findall(".//MODULEPATH"):
              mp.set("path", juce_modules)
          for mod in root.findall(".//MODULE"):
              mod.set('useLocalCopy', '0')
              mod.set('useGlobalPath', '0')
          
          # 3. Bersihkan exporter lama dan buat Exporter iOS yang bersih
          export_formats = root.find('EXPORTFORMATS')
          if export_formats is not None:
              for child in list(export_formats):
                  export_formats.remove(child)
          
          # Tambahkan Izin Jaringan (Mencegah Force Close)
          plist_extras = """
          <plist>
            <dict>
              <key>NSLocalNetworkUsageDescription</key>
              <string>SkyStream membutuhkan akses jaringan lokal untuk audio.</string>
              <key>NSBluetoothAlwaysUsageDescription</key>
              <string>SkyStream membutuhkan akses bluetooth.</string>
            </dict>
          </plist>
          """
          
          xcode_iphone = ET.SubElement(export_formats, 'XCODE_IPHONE', {
              'targetFolder': 'Builds/iOS',
              'appleCombinedIPHONEOS_IPHONESIMULATOR': '1',
              'iosScreenOrientation': 'UIInterfaceOrientationPortrait',
              'bundleIdentifier': 'com.skystream.rx',
              'deploymentTarget': '13.0',
              'customPList': plist_extras.strip()
          })
          
          configs = ET.SubElement(xcode_iphone, 'CONFIGURATIONS')
          # Kita biarkan targetName mengikuti nama project asli agar skema tidak error
          ET.SubElement(configs, 'CONFIGURATION', {'isDebug': '1', 'name': 'Debug', 'targetName': 'SkyStreamRXV2'})
          ET.SubElement(configs, 'CONFIGURATION', {'isDebug': '0', 'name': 'Release', 'targetName': 'SkyStreamRXV2'})
          
          module_paths = ET.SubElement(xcode_iphone, 'MODULEPATHS')
          for mod in root.findall(".//MODULES/MODULE"):
              mod_id = mod.get('id')
              ET.SubElement(module_paths, 'MODULEPATH', {'id': mod_id, 'path': juce_modules})
          
          tree.write(jucer_path, encoding='utf-8', xml_declaration=True)

      - name: Resave Jucer File
        run: |
          Projucer --resave NewProject/NewProject.jucer --fix-missing-dependencies

      - name: Build iOS App (arm64)
        run: |
          # Gunakan skema default yang pasti ada
          xcodebuild -project NewProject/Builds/iOS/SkyStreamRXV2.xcodeproj \
                     -scheme "SkyStreamRXV2 - App" \
                     -configuration Release \
                     -sdk iphoneos \
                     -arch arm64 \
                     CONFIGURATION_BUILD_DIR=$GITHUB_WORKSPACE/NewProject/Builds/iOS/build \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     AD_HOC_CODE_SIGNING_ALLOWED=YES \
                     build

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SkyStream-iOS
          path: NewProject/Builds/iOS/build/*.app